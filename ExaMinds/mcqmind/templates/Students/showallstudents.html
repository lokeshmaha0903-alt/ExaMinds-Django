<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <nav class="navbar bg-body-tertiary" style="margin-left: 1200px;">
        <form class="container-fluid justify-content-start">
            <button class="btn btn-outline-success me-2" type="button"><a href="/" style="text-decoration: none;color: green;">Registration</a></button>
            <button class="btn btn-outline-success me-2" type="button"><a href="/cruduserpage/" style="text-decoration: none;color: green;">User Crud</a></button>
        </form>
    </nav>

    <h1 style="text-align: center; margin-top: 30px;"><caption>User Information</caption></h1>
    <table class="table table-striped" style="width: 70%; margin-left: 14%;">

        <thead>
            <tr>
                
                <th scope="col">Username</th>
                <th scope="col">Password</th>
                <th scope="col">Mobile No</th>
                <th scope="col">Delete</th>
            </tr>
        </thead>
        <tbody>
            {% for user in userdb %}
            <tr>

                
                <td>{{user.username}}</td>
                <td>{{user.password}}</td>
                <td>{{user.mobile_no}}</td>
                <td><a href="/deleteuser/?username={{user.username}}"><i class="bi bi-trash"></i></a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>

</html>
