{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet"  href="{% static 'usercrud.css' %}">
</head>
<body>

    <nav class="navbar bg-body-tertiary">
        <form class="container-fluid justify-content-start">
            <button class="btn btn-outline-success me-2" type="button"><a href="/" style="text-decoration: none;color: green;">Registration</a></button>
            <button class="btn btn-outline-success me-2" type="button"><a href="/loginuserpage/" style="text-decoration: none;color: green;">Login User</a></button>
            <button class="btn btn-outline-success me-2" type="button"><a href="/homepage/" style="text-decoration: none;color: green;">Homepage</a></button>
            <!-- <button class="btn btn-outline-success me-2" type="button"><a href="//" style="text-decoration: none;color: green;">#####</a></button> -->
            <button class="btn btn-outline-success me-2" type="button" style="margin-left: 830px;"><a href="/logoutuser/" style="text-decoration: none;color: green;">Logout</a></button>
        </form>
    </nav>
    
    <center>
        <form class="card" method="post">
            {% csrf_token %}
        <table>
            <tr>
                <th>UserName: </th>
                <td><input type="text" name="username" value="{{userdata.username}}"></td>
            </tr>

            <tr>
                <th>Password: </th>
                <td><input type="password" name="password" value="{{userdata.password}}"></td>
            </tr>

            <tr>
                <th>Mobile no.: </th>
                <td><input type="number" name="mobile_no" value="{{userdata.mobile_no}}"></td>
            </tr>

            <tr>
                <td colspan="2"><center><input class="btn1" type="submit" value="Add" formaction="/crudAddUser/">
                <input class="btn2" type="submit" value="Show" formaction="/crudViewUser/">
                <input class="btn3" type="submit" value="Update" formaction="/crudUpdateUser/">
                <input class="btn4" type="submit" value="Delete" formaction="/crudDeleteUser/"></center></td>
            </tr>
        </table>
        {{msg}}
    </form>
    </center>

</body>
</html>
